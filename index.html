<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio | Linktree Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; min-height: 100vh; background-color: #ffffff; color: #0f172a; }
        .dark body { background-color: #020617; color: #f8fafc; }
        .solid-card { background-color: #f1f5f9; border: 2px solid #e2e8f0; transition: all 0.2s ease-in-out; }
        .dark .solid-card { background-color: #1e293b; border: 2px solid #334155; }
        .link-card:hover { transform: translateY(-2px); border-color: #4f46e5; background-color: #ffffff; }
        .dark .link-card:hover { background-color: #0f172a; border-color: #818cf8; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .admin-input { border: 2px solid #cbd5e1; background-color: #ffffff; padding: 12px; border-radius: 12px; width: 100%; font-weight: 600; }
        .dark .admin-input { border: 2px solid #334155; background-color: #0f172a; color: white; }
    </style>
</head>
<body class="antialiased transition-colors duration-300">

    <div id="app" class="max-w-md mx-auto px-6 py-12 relative z-10">
        <div id="status-container" class="flex flex-col items-center justify-center space-y-4 py-32 text-center">
            <div id="loader" class="w-10 h-10 border-4 border-slate-300 border-t-indigo-600 rounded-full animate-spin"></div>
            <p id="status-text" class="font-bold text-slate-500 text-sm tracking-widest uppercase">A Sincronizar com Firebase...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Credenciais atualizadas do projeto gestao-anisio
        const firebaseConfig = {
            apiKey: "AIzaSyCb2Cmqwivdgb_YgCUQbcx43S38QYRDapA",
            authDomain: "gestao-anisio.firebaseapp.com",
            projectId: "gestao-anisio",
            storageBucket: "gestao-anisio.firebasestorage.app",
            messagingSenderId: "946435999048",
            appId: "1:946435999048:web:a3cae6ed73c21a30b59f7d",
            measurementId: "G-KHL4B7MR3X"
        };

        const appId = "meu-linktree-oficial";
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_config', 'main');

        let state = {
            profile: { name: "O Teu Nome", bio: "Bio configurada. Clica abaixo para editar.", photo: "https://via.placeholder.com/150", verified: true },
            links: [],
            socials: { instagram: "", linkedin: "", twitter: "", github: "" },
            view: 'home',
            user: null
        };

        const showError = (msg) => {
            const text = document.getElementById('status-text');
            const loader = document.getElementById('loader');
            if (loader) loader.classList.add('hidden');
            if (text) text.innerHTML = `<span class="text-red-500 font-bold block mb-2 text-lg">ERRO</span><span class="text-slate-400 normal-case">${msg}</span>`;
        };

        async function init() {
            try {
                // Autenticação Silenciosa
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    state.user = user;
                    if (user) {
                        onSnapshot(docRef, (docSnap) => {
                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                state.profile = data.profile || state.profile;
                                state.links = data.links || [];
                                state.socials = data.socials || state.socials;
                            }
                            render();
                        }, (err) => {
                            showError("Erro Firestore: Verifica se ativaste a base de dados e as regras de acesso.");
                        });
                    }
                });
            } catch (error) {
                showError("Erro Firebase: Ativa o 'Anonymous Sign-in' no menu Authentication.");
            }
        }

        // Funções de Interface
        window.setView = (v) => { state.view = v; render(); };
        window.handleLogin = () => {
            if (document.getElementById('passInput').value === 'admin') window.setView('admin');
            else alert('Senha incorreta!');
        };
        window.updateLink = (i, f, v) => { state.links[i][f] = v; };
        window.addLink = () => {
            state.links.unshift({ id: 'l'+Date.now(), title: "Novo Link", url: "https://", icon: "link", color: "indigo", clicks: 0 });
            render();
        };
        window.removeLink = (i) => { state.links.splice(i, 1); render(); };
        window.saveAll = async () => {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "A GUARDAR...";
            const profile = {
                name: document.getElementById('editName').value,
                bio: document.getElementById('editBio').value,
                photo: document.getElementById('editPhoto').value,
                verified: document.getElementById('editVerified').checked
            };
            try {
                await setDoc(docRef, { profile, links: state.links, socials: state.socials });
                window.setView('home');
            } catch (e) { 
                console.error(e);
                alert('Erro ao salvar no banco de dados!'); 
                btn.disabled = false; 
                btn.innerText = "TENTAR NOVAMENTE"; 
            }
        };

        function render() {
            const container = document.getElementById('app');
            container.innerHTML = '';
            if (state.view === 'home') container.innerHTML = renderHomeHTML();
            else if (state.view === 'login') container.innerHTML = renderLoginHTML();
            else if (state.view === 'admin') container.innerHTML = renderAdminHTML();
            lucide.createIcons();
        }

        function renderHomeHTML() {
            return `
            <div class="fade-in">
                <header class="text-center space-y-6 mb-10 pt-10">
                    <img src="${state.profile.photo}" class="w-32 h-32 rounded-full border-4 border-indigo-600 mx-auto object-cover shadow-xl" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="space-y-2">
                        <h1 class="text-3xl font-extrabold flex items-center justify-center gap-2">${state.profile.name} ${state.profile.verified ? '<i data-lucide="badge-check" class="text-indigo-600"></i>' : ''}</h1>
                        <p class="text-lg text-slate-500 font-medium">${state.profile.bio}</p>
                    </div>
                </header>
                <div class="space-y-4">
                    ${state.links.length ? state.links.map(l => `<a href="${l.url}" target="_blank" class="solid-card link-card flex items-center p-5 rounded-xl font-bold text-xl"><i data-lucide="${l.icon || 'link'}" class="mr-4 text-indigo-600"></i>${l.title}</a>`).join('') : '<p class="text-center text-slate-400 py-10">Página configurada com sucesso. Entra no Admin para adicionar links.</p>'}
                </div>
                <footer class="mt-20 text-center pb-10"><button onclick="window.setView('login')" class="bg-slate-100 dark:bg-slate-800 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest opacity-50 hover:opacity-100 transition-opacity">Configurações</button></footer>
            </div>`;
        }

        function renderLoginHTML() {
            return `<div class="solid-card p-10 rounded-2xl space-y-6 fade-in shadow-2xl">
                <h2 class="text-2xl font-black text-center">Painel Admin</h2>
                <input type="password" id="passInput" class="admin-input text-center text-xl" placeholder="Senha">
                <button onclick="window.handleLogin()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">ENTRAR</button>
                <button onclick="window.setView('home')" class="w-full text-slate-400 font-bold">VOLTAR</button>
            </div>`;
        }

        function renderAdminHTML() {
            return `<div class="space-y-8 fade-in">
                <div class="flex justify-between items-center"><h2 class="text-2xl font-black italic tracking-tighter text-indigo-600">Editor</h2><button onclick="window.setView('home')" class="text-red-500 font-black">X</button></div>
                <section class="space-y-4">
                    <input type="text" id="editName" value="${state.profile.name}" class="admin-input" placeholder="Nome">
                    <textarea id="editBio" class="admin-input h-24" placeholder="Bio">${state.profile.bio}</textarea>
                    <input type="text" id="editPhoto" value="${state.profile.photo}" placeholder="Link da Foto" class="admin-input">
                    <label class="flex items-center gap-3 font-bold bg-slate-50 dark:bg-slate-900 p-4 rounded-xl"><input type="checkbox" id="editVerified" ${state.profile.verified ? 'checked' : ''} class="w-5 h-5"> Selo Verificado</label>
                </section>
                <section class="space-y-4">
                    <div class="flex justify-between items-center"><h3 class="text-xs font-black uppercase">Links</h3><button onclick="window.addLink()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-black">+ NOVO</button></div>
                    <div class="space-y-6">
                        ${state.links.map((l, i) => `<div class="solid-card p-6 rounded-2xl space-y-4 relative">
                            <div class="flex justify-between items-center"><span class="text-[10px] font-bold text-slate-400 uppercase">Botão ${i+1}</span><button onclick="window.removeLink(${i})" class="text-red-500 font-bold text-[10px] uppercase">Eliminar</button></div>
                            <input type="text" value="${l.title}" oninput="window.updateLink(${i}, 'title', this.value)" placeholder="Título" class="admin-input">
                            <input type="text" value="${l.url}" oninput="window.updateLink(${i}, 'url', this.value)" placeholder="URL" class="admin-input">
                        </div>`).join('')}
                    </div>
                </section>
                <button onclick="window.saveAll()" id="saveBtn" class="w-full bg-indigo-600 text-white p-6 rounded-2xl font-black text-xl shadow-2xl hover:bg-indigo-700 transition-all">PUBLICAR AGORA</button>
            </div>`;
        }

        init();
    </script>
</body>
</html>
